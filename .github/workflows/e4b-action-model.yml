name: E4B Action Adapter Data Pipeline

on:
  push:
    paths:
      - 'models/arya-e4b-action/**'
      - 'scripts/validate_arya_e4b_action_dataset.py'
      - '.github/workflows/e4b-action-model.yml'
  pull_request:
    paths:
      - 'models/arya-e4b-action/**'
      - 'scripts/validate_arya_e4b_action_dataset.py'
      - '.github/workflows/e4b-action-model.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'validate or training-preflight'
        required: true
        default: 'validate'
        type: choice
        options: [validate, training-preflight]

permissions:
  contents: read

jobs:
  validate-action-ir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deterministic bootstrap corpus
        run: |
          python3 scripts/generate_arya_e4b_bootstrap_corpus.py \
            --output models/arya-e4b-action/dataset/generated/arya_action_bootstrap_v0.1.jsonl
      - name: Validate Action IR corpora
        run: |
          python3 scripts/validate_arya_e4b_action_dataset.py \
            models/arya-e4b-action/dataset/seed.fa-en.jsonl \
            --manifest models/arya-e4b-action/artifacts/seed-manifest.json
          python3 scripts/validate_arya_e4b_action_dataset.py \
            models/arya-e4b-action/dataset/generated/arya_action_bootstrap_v0.1.jsonl \
            --manifest models/arya-e4b-action/artifacts/bootstrap-manifest.json
          python3 scripts/validate_arya_e4b_action_dataset.py \
            models/arya-e4b-action/dataset/reviewed/arya_action_train_v2_1000_unique.jsonl \
            --manifest models/arya-e4b-action/artifacts/reviewed-train-manifest.json
          python3 scripts/validate_arya_e4b_action_dataset.py \
            models/arya-e4b-action/dataset/heldout/arya_action_eval_v2_300_unique.jsonl \
            --manifest models/arya-e4b-action/artifacts/heldout-eval-manifest.json
      - name: Upload validated dataset manifests
        uses: actions/upload-artifact@v4
        with:
          name: arya-e4b-action-dataset-manifests
          path: models/arya-e4b-action/artifacts/*.json
          retention-days: 30

  training-preflight:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'training-preflight'
    needs: validate-action-ir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Explain E4B GPU training boundary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Arya E4B Action Adapter — training preflight

          Dataset/schema validation completed on GitHub hosted CPU.

          A Gemma 4 E4B QLoRA run requires a real GPU runner and base-model access.
          This workflow intentionally does not pretend to train a 4B model on a
          GitHub hosted CPU runner. Use a self-hosted GPU or an explicit GPU
          provider workflow after the seed corpus and evaluation gates are approved.
          EOF
